services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/symfony
      - vendor_data:/var/www/symfony/vendor
      - var_data:/var/www/symfony/var
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://root:root@database:3306/symfoconnect_db?serverVersion=8.4&charset=utf8mb4"
      MAILER_DSN: "smtp://mailer:1025"

  nginx:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/symfony
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  database:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfoconnect_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "6033:3306"
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin-symfoconnect:
    image: phpmyadmin:apache
    container_name: phpmyadmin-symfoconnect
    links:
      - database
    volumes:
      - ./docker/phpmyadmin/servername.conf:/etc/apache2/conf-enabled/servername.conf:ro
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    restart: always
    ports:
      - "8081:80"

  mailer:
    image: schickling/mailcatcher
    ports:
      - "1025:1025"
      - "1080:1080"

volumes:
  dbdata:
  vendor_data:
  var_data: